<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Sign in — HoldCrew Casting</title>
  <style>
    body { margin:0; background:#0a0a0a; color:#e0e0e0; font-family:'DM Sans',Helvetica,Arial,sans-serif;
      display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .box { width:100%; max-width:320px; padding:1.5rem; }
    h1 { font-family:'Bebas Neue',Impact,sans-serif; font-size:34px; letter-spacing:0.04em; margin:0 0 1.25rem; }
    .amber { color:#f5a623; }
    input { width:100%; box-sizing:border-box; background:#161616; border:1px solid #2a2a2a; border-radius:6px;
      color:#e0e0e0; font-size:15px; padding:0.7rem 0.8rem; margin-bottom:0.75rem; }
    input:focus { outline:none; border-color:#f5a623; }
    button { width:100%; background:#f5a623; color:#000; border:none; border-radius:6px; font-weight:600;
      font-size:14px; padding:0.7rem; cursor:pointer; }
    .err { color:#e05c5c; font-family:'DM Mono',monospace; font-size:11px; min-height:16px; margin-top:0.5rem; }
  </style>
</head>
<body>
  <form class="box" onsubmit="return signin(event)">
    <h1>HoldCrew <span class="amber">Casting</span></h1>
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password" autofocus>
    <button type="submit">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    async function signin(e) {
      e.preventDefault();
      const err = document.getElementById('err'); err.textContent = '';
      const r = await fetch('/api/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: document.getElementById('pw').value }),
      });
      if (r.ok) {
        const next = new URLSearchParams(location.search).get('next') || '/';
        location.href = /^\/[^/]/.test(next) ? next : '/';
      } else {
        err.textContent = 'Incorrect password.';
      }
      return false;
    }
  </script>
</body>
</html>
